networks:
  kadastra_net:
    name: kadastra_net

services:
  kadastra:
    build:
      context: .
      target: runtime
    ports:
      # Stage maps host port = container port = 15777. When prod gets
      # added to the same VM later, one of them moves to a different
      # host port (KADASTRA_HOST_PORT in .env) — for now keep it
      # symmetric with local dev.
      - "${KADASTRA_HOST_PORT:-15777}:15777"
    env_file:
      - .env
    environment:
      SERVE_HOST: 0.0.0.0
      SERVE_PORT: 15777
    volumes:
      # Stage uses a named volume so data survives `docker compose
      # down`. Cold-start pulls from S3 when PULL_DATA_ON_START=true.
      - kadastra_data:/app/data
    networks:
      - kadastra_net
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:15777/health"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 60s
    restart: unless-stopped

volumes:
  kadastra_data:
