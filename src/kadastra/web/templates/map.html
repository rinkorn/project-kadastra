<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>kadastra — Tatarstan hex features</title>
  <link rel="stylesheet" href="https://unpkg.com/maplibre-gl@5.0.0/dist/maplibre-gl.css">
  <script src="https://unpkg.com/maplibre-gl@5.0.0/dist/maplibre-gl.js"></script>
  <script src="https://unpkg.com/h3-js@4.2.1/dist/h3-js.umd.js"></script>
  <script src="https://unpkg.com/deck.gl@9.1.0/dist.min.js"></script>
  <style>
    body { margin: 0; font-family: system-ui, sans-serif; }
    #map { position: absolute; top: 56px; bottom: 0; left: 0; right: 0; }
    .panel {
      position: absolute; top: 0; left: 0; right: 0; height: 56px;
      display: flex; align-items: center; gap: 12px;
      padding: 0 16px;
      background: #1f2937; color: #fff; z-index: 10;
    }
    .panel select, .panel input {
      padding: 6px 8px; border-radius: 4px; border: 1px solid #4b5563;
      background: #111827; color: #fff;
    }
    .panel .badge {
      padding: 3px 8px; border-radius: 10px; font-size: 11px;
      background: #b45309; color: #fff; cursor: help; user-select: none;
    }
    .panel .stat { margin-left: auto; opacity: 0.85; font-size: 14px; }
    .legend {
      position: absolute; bottom: 16px; left: 16px;
      background: rgba(31, 41, 55, 0.9); color: #fff;
      padding: 8px 12px; border-radius: 6px; font-size: 12px; z-index: 10;
    }
    .legend .gradient { width: 200px; height: 8px; margin-top: 4px;
      background: linear-gradient(to right, #2c7bb6, #abd9e9, #ffffbf, #fdae61, #d7191c);
    }
    .legend .ticks { display: flex; justify-content: space-between; margin-top: 2px; }
  </style>
</head>
<body>
  <div class="panel">
    <strong>kadastra</strong>
    <span class="badge" title="Object targets are real ЕГРН cost_index values from NSPD (per ADR-0009). Hex features are still OSM-derived; metro is Kazan-only.">ЕГРН cost_index</span>
    <label>Mode:
      <select id="mode">
        <option value="hex" selected>Hex feature</option>
        <option value="object:apartment">Objects: apartment</option>
        <option value="object:house">Objects: house</option>
        <option value="object:commercial">Objects: commercial</option>
        <option value="object:landplot">Objects: landplot</option>
      </select>
    </label>
    <label>Feature:
      <select id="feature">
        {% for f in features %}<option value="{{ f }}">{{ f }}</option>{% endfor %}
      </select>
    </label>
    <label>Resolution:
      <select id="resolution">
        <option value="7">7 (~5 km², ~1.4 km)</option>
        <option value="8">8 (~0.7 km², ~530 m)</option>
        <option value="9">9 (~0.1 km², ~200 m)</option>
        <option value="10" selected>10 (~15 000 m², ~75 m)</option>
        <option value="11">11 (~2 100 m², ~28 m)</option>
      </select>
    </label>
    <label>Scale:
      <select id="scale">
        <option value="log" selected>log (min–max)</option>
        <option value="p98">linear (p2–p98)</option>
        <option value="linear">linear (min–max)</option>
      </select>
    </label>
    <span class="stat" id="stat"></span>
  </div>
  <div id="map"></div>
  <div class="legend">
    <div id="legend-feature"></div>
    <div class="gradient"></div>
    <div class="ticks"><span id="legend-min">min</span><span id="legend-max">max</span></div>
  </div>

<script>
const map = new maplibregl.Map({
  container: 'map',
  style: {
    version: 8,
    sources: {
      osm: {
        type: 'raster',
        tiles: ['https://tile.openstreetmap.org/{z}/{x}/{y}.png'],
        tileSize: 256,
        attribution: '© OpenStreetMap contributors'
      }
    },
    layers: [{ id: 'osm', type: 'raster', source: 'osm' }]
  },
  center: [49.13, 55.79],
  zoom: 9
});

const deckOverlay = new deck.MapboxOverlay({
  interleaved: false,
  layers: []
});
map.addControl(deckOverlay);

function colorRamp(t) {
  // Inferno-ish: dark blue -> light blue -> yellow -> orange -> red
  const stops = [
    [44, 123, 182],
    [171, 217, 233],
    [255, 255, 191],
    [253, 174, 97],
    [215, 25, 28]
  ];
  const k = Math.min(Math.max(t, 0), 1) * (stops.length - 1);
  const i = Math.floor(k);
  const f = k - i;
  const a = stops[i];
  const b = stops[Math.min(i + 1, stops.length - 1)];
  return [
    Math.round(a[0] + (b[0] - a[0]) * f),
    Math.round(a[1] + (b[1] - a[1]) * f),
    Math.round(a[2] + (b[2] - a[2]) * f),
    180
  ];
}

function quantile(sortedValues, q) {
  if (sortedValues.length === 0) return 0;
  const pos = (sortedValues.length - 1) * q;
  const base = Math.floor(pos);
  const rest = pos - base;
  if (base + 1 < sortedValues.length) {
    return sortedValues[base] + rest * (sortedValues[base + 1] - sortedValues[base]);
  }
  return sortedValues[base];
}

function buildScaler(values, mode) {
  const sorted = [...values].sort((a, b) => a - b);
  let lo, hi, transform;
  if (mode === 'log') {
    transform = v => Math.log(Math.max(v, 1));
    lo = transform(sorted[0]);
    hi = transform(sorted[sorted.length - 1]);
  } else if (mode === 'p98') {
    transform = v => v;
    lo = quantile(sorted, 0.02);
    hi = quantile(sorted, 0.98);
  } else {
    transform = v => v;
    lo = sorted[0];
    hi = sorted[sorted.length - 1];
  }
  const range = hi - lo || 1;
  return { lo, hi, normalize: v => Math.min(Math.max((transform(v) - lo) / range, 0), 1) };
}

async function refreshHex() {
  const feature = document.getElementById('feature').value;
  const resolution = parseInt(document.getElementById('resolution').value, 10);
  const scaleMode = document.getElementById('scale').value;
  const stat = document.getElementById('stat');
  stat.textContent = 'loading…';
  const r = await fetch(`/api/hex_features?resolution=${resolution}&feature=${encodeURIComponent(feature)}`);
  if (!r.ok) {
    stat.textContent = `error ${r.status}`;
    deckOverlay.setProps({ layers: [] });
    return;
  }
  const payload = await r.json();
  const data = payload.data;
  if (data.length === 0) {
    stat.textContent = '0 hexes';
    deckOverlay.setProps({ layers: [] });
    return;
  }
  const values = data.map(d => d.value);
  const scaler = buildScaler(values, scaleMode);
  const layer = new deck.H3HexagonLayer({
    id: 'hex',
    data,
    getHexagon: d => d.hex,
    getFillColor: d => colorRamp(scaler.normalize(d.value)),
    stroked: false,
    extruded: false,
    pickable: true
  });
  deckOverlay.setProps({
    layers: [layer],
    getTooltip: ({ object }) => object && `${feature}: ${object.value}`
  });
  document.getElementById('legend-feature').textContent = `${feature} (${scaleMode})`;
  updateLegend(values, scaleMode);
  stat.textContent = `${data.length.toLocaleString()} hexes`;
}

async function refreshObjects(assetClass) {
  const scaleMode = document.getElementById('scale').value;
  const stat = document.getElementById('stat');
  stat.textContent = 'loading…';
  const r = await fetch(`/api/object_predictions?asset_class=${encodeURIComponent(assetClass)}`);
  if (!r.ok) {
    stat.textContent = `error ${r.status}`;
    deckOverlay.setProps({ layers: [] });
    return;
  }
  const payload = await r.json();
  const data = payload.data;
  if (data.length === 0) {
    stat.textContent = '0 objects';
    deckOverlay.setProps({ layers: [] });
    return;
  }
  const values = data.map(d => d.value);
  const scaler = buildScaler(values, scaleMode);
  const layer = new deck.ScatterplotLayer({
    id: 'objects',
    data,
    getPosition: d => [d.lon, d.lat],
    getFillColor: d => colorRamp(scaler.normalize(d.value)),
    radiusUnits: 'meters',
    getRadius: 18,
    stroked: false,
    pickable: true
  });
  deckOverlay.setProps({
    layers: [layer],
    getTooltip: ({ object }) =>
      object && `${assetClass} ${object.object_id}: ${Math.round(object.value).toLocaleString()} ₽/м²`
  });
  document.getElementById('legend-feature').textContent = `${assetClass} predicted ₽/м² (${scaleMode})`;
  updateLegend(values, scaleMode);
  stat.textContent = `${data.length.toLocaleString()} objects`;
}

function updateLegend(values, scaleMode) {
  const sorted = [...values].sort((a, b) => a - b);
  let lo, hi;
  if (scaleMode === 'p98') {
    lo = quantile(sorted, 0.02);
    hi = quantile(sorted, 0.98);
  } else {
    lo = sorted[0];
    hi = sorted[sorted.length - 1];
  }
  document.getElementById('legend-min').textContent = lo.toFixed(2);
  document.getElementById('legend-max').textContent = hi.toFixed(2);
}

async function refresh() {
  try {
    const mode = document.getElementById('mode').value;
    const featureControls = document.getElementById('feature').parentElement;
    const resolutionControls = document.getElementById('resolution').parentElement;
    if (mode === 'hex') {
      featureControls.style.display = '';
      resolutionControls.style.display = '';
      await refreshHex();
    } else {
      const assetClass = mode.split(':')[1];
      featureControls.style.display = 'none';
      resolutionControls.style.display = 'none';
      await refreshObjects(assetClass);
    }
  } catch (e) {
    document.getElementById('stat').textContent = `error: ${e.message}`;
  }
}

document.getElementById('mode').addEventListener('change', refresh);
document.getElementById('feature').addEventListener('change', refresh);
document.getElementById('resolution').addEventListener('change', refresh);
document.getElementById('scale').addEventListener('change', refresh);
map.on('load', refresh);
</script>
</body>
</html>
