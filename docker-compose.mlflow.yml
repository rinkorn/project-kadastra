# MLflow stack: Postgres backend-store + MLflow tracking server with
# S3 artifact store on the project bucket.
#
# Run:
#   docker compose -f docker-compose.mlflow.yml up -d --build
#
# Expects .env to contain:
#   MLFLOW_DB_PASSWORD=...                 (new; see .env.example)
#   S3_ENDPOINT_URL, S3_BUCKET, S3_ACCESS_KEY, S3_SECRET_KEY, S3_REGION
#
# Tracking UI:  http://127.0.0.1:5000
# Artifact root: s3://$S3_BUCKET/mlflow-artifacts/

services:
  mlflow-postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: mlflow
      POSTGRES_PASSWORD: ${MLFLOW_DB_PASSWORD}
      POSTGRES_DB: mlflow
    volumes:
      - mlflow-pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "mlflow"]
      interval: 5s
      timeout: 5s
      retries: 10

  mlflow-server:
    build:
      context: ./infra/mlflow
    restart: unless-stopped
    depends_on:
      mlflow-postgres:
        condition: service_healthy
    environment:
      MLFLOW_S3_ENDPOINT_URL: ${S3_ENDPOINT_URL}
      AWS_ACCESS_KEY_ID: ${S3_ACCESS_KEY}
      AWS_SECRET_ACCESS_KEY: ${S3_SECRET_KEY}
      AWS_DEFAULT_REGION: ${S3_REGION:-us-east-1}
    command:
      - server
      - --host=0.0.0.0
      - --port=5000
      - --backend-store-uri=postgresql+psycopg2://mlflow:${MLFLOW_DB_PASSWORD}@mlflow-postgres:5432/mlflow
      - --default-artifact-root=s3://${S3_BUCKET}/mlflow-artifacts/
      - --serve-artifacts
    ports:
      - "127.0.0.1:5000:5000"

volumes:
  mlflow-pg:
