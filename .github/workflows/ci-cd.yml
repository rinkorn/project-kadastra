name: CI/CD

on:
  push:
    branches: [dev, dev-stage, main]
  pull_request:
    branches: [dev, dev-stage, main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - run: uv sync --frozen
      - run: uv run ruff check .
      - run: uv run ruff format --check .

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - run: uv sync --frozen
      - run: uv run pytest -x -v

  deploy-dev-stage:
    needs: [lint, test]
    if: github.event_name == 'push' && github.ref == 'refs/heads/dev-stage'
    runs-on: ubuntu-latest
    env:
      DEPLOY_PATH: ${{ vars.DEV_STAGE_DEPLOY_PATH }}
    steps:
      - uses: actions/checkout@v4
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEV_STAGE_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p ${{ vars.DEV_STAGE_PORT }} ${{ vars.DEV_STAGE_HOST }} >> ~/.ssh/known_hosts 2>/dev/null
      - name: Sync sources to VM
        run: |
          # `data/` is gitignored except for the whitelisted region
          # boundary GeoJSON (see .gitignore) — so the runner's checkout
          # only contains that one tiny file under data/. Don't blanket-
          # exclude `data` here: that would also drop the boundary file
          # the Docker build needs.
          rsync -az --delete \
            -e "ssh -i ~/.ssh/deploy_key -p ${{ vars.DEV_STAGE_PORT }}" \
            --exclude '.git' \
            --exclude '.venv' \
            --exclude '__pycache__' \
            --exclude '.env' \
            --exclude '.ruff_cache' \
            --exclude '.pytest_cache' \
            --exclude 'mlruns' \
            --exclude 'site' \
            . ${{ vars.DEPLOY_USER }}@${{ vars.DEV_STAGE_HOST }}:${{ env.DEPLOY_PATH }}/
      - name: Generate .env on VM
        run: |
          ssh -i ~/.ssh/deploy_key -p ${{ vars.DEV_STAGE_PORT }} \
            ${{ vars.DEPLOY_USER }}@${{ vars.DEV_STAGE_HOST }} \
            "cat > ${{ env.DEPLOY_PATH }}/.env << 'ENVEOF'
          KADASTRA_HOST_PORT=${{ vars.DEV_STAGE_INTERNAL_PORT }}
          SERVE_HOST=0.0.0.0
          SERVE_PORT=15777
          PULL_DATA_ON_START=${{ vars.DEV_STAGE_PULL_DATA_ON_START }}
          PULL_DATA_ON_START_PREFIX=Kadatastr
          PULL_DATA_ON_START_DST=data
          S3_ENDPOINT_URL=${{ vars.DEV_STAGE_S3_ENDPOINT_URL }}
          S3_BUCKET=${{ vars.DEV_STAGE_S3_BUCKET }}
          S3_ACCESS_KEY=${{ secrets.DEV_STAGE_S3_ACCESS_KEY }}
          S3_SECRET_KEY=${{ secrets.DEV_STAGE_S3_SECRET_KEY }}
          S3_REGION=${{ vars.DEV_STAGE_S3_REGION }}
          S3_ADDRESSING_STYLE=${{ vars.DEV_STAGE_S3_ADDRESSING_STYLE }}
          AUTH_TOKEN=${{ secrets.DEV_STAGE_AUTH_TOKEN }}
          MLFLOW_ENABLED=false
          ENVEOF"
      - name: Build and start dev-stage stack
        run: |
          ssh -i ~/.ssh/deploy_key -p ${{ vars.DEV_STAGE_PORT }} \
            ${{ vars.DEPLOY_USER }}@${{ vars.DEV_STAGE_HOST }} \
            "cd ${{ env.DEPLOY_PATH }} && \
             docker compose -p kadastra-dev-stage -f docker-compose.dev-stage.yml up -d --build --remove-orphans"
      - name: Wait for healthcheck
        run: |
          ssh -i ~/.ssh/deploy_key -p ${{ vars.DEV_STAGE_PORT }} \
            ${{ vars.DEPLOY_USER }}@${{ vars.DEV_STAGE_HOST }} \
            "for i in \$(seq 1 30); do
               if curl -fsS http://localhost:${{ vars.DEV_STAGE_INTERNAL_PORT }}/health > /dev/null 2>&1; then
                 echo 'Healthcheck passed'
                 exit 0
               fi
               sleep 5
             done
             echo 'Healthcheck did not pass after 150s' >&2
             docker compose -p kadastra-dev-stage -f ${{ env.DEPLOY_PATH }}/docker-compose.dev-stage.yml logs --tail=200 >&2
             exit 1"
